                 "garantías constitucionales"]
    normas: ["Constitución art 20", "Constitución art 19", "AA Protección"]
    antonimos_resolucion: ["se acoge la protección / se rechaza"]
    ambito: administrativo
    tipo_recurso_tipico: ["proteccion"]

  recurso de amparo económico:
    sinonimos: ["amparo económico", "Ley 18.971"]
    normas: ["Ley 18.971", "Constitución art 19 N° 21"]
    ambito: administrativo
    tipo_recurso_tipico: ["amparo-economico"]

  acto administrativo:
    sinonimos: ["resolución administrativa", "decreto", "acto reglado",
                 "potestad discrecional"]
    normas: ["Ley 19.880", "Ley 18.575"]
    antonimos_resolucion: ["es válido / es nulo", "es legal / es ilegal"]
    ambito: administrativo

  silencio administrativo:
    sinonimos: ["silencio positivo", "silencio negativo", "rechazo presunto"]
    normas: ["Ley 19.880 art 64", "Ley 19.880 art 65", "Ley 19.880 art 66"]
    ambito: administrativo

  potestad sancionatoria:
    sinonimos: ["sanción administrativa", "procedimiento sancionatorio",
                 "potestad disciplinaria"]
    normas: ["Ley 19.880", "Ley 18.575 art 7"]
    antonimos_resolucion: ["es legítima la sanción / es ilegítima"]
