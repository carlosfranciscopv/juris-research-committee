  COT: ["Código Orgánico de Tribunales", "COT"]
  CTrib: ["Código Tributario", "Cód. Tributario"]
  LSA: ["Ley 18.046", "Ley de Sociedades Anónimas", "LSA"]
  LGUC: ["Ley General de Urbanismo y Construcciones", "LGUC"]
  OGUC: ["Ordenanza General de Urbanismo y Construcciones", "OGUC"]
