                 "excesiva onerosidad sobreviniente", "alteración de circunstancias"]
    normas: ["CC art 1545", "CC art 1546", "CC art 1560"]
    antonimos_resolucion: ["procede revisión / no procede revisión",
                            "se ajusta el contrato / se mantiene"]
    ambito: civil
    instituciones_relacionadas: ["fuerza mayor", "buena fe contractual"]

  buena fe contractual:
    sinonimos: ["buena fe", "ejecución de buena fe", "principio de buena fe"]
    normas: ["CC art 1546", "CC art 707", "CC art 1683", "CCom art 96"]
    antonimos_resolucion: ["actuó de buena fe / actuó de mala fe"]
    ambito: civil
    instituciones_relacionadas: ["abuso del derecho", "imprevisión"]

  abuso del derecho:
    sinonimos: ["ejercicio abusivo", "abuso de derecho", "uso abusivo del derecho"]
    normas: ["CC art 1546", "CC art 2314", "Constitución art 19 N° 24"]
    antonimos_resolucion: ["hay abuso / no hay abuso"]
    ambito: civil
    instituciones_relacionadas: ["buena fe contractual"]

  vicios redhibitorios:
    sinonimos: ["vicios ocultos", "redhibitoria", "acción redhibitoria",
                 "acción quanti minoris", "rebaja del precio"]
    normas: ["CC art 1857", "CC art 1858", "CC art 1860", "CC art 1861",
             "CC art 1862", "CC art 1863", "CC art 1864", "CC art 1866",
             "CC art 1869"]
    antonimos_resolucion: ["constituye vicio redhibitorio / no constituye",
                            "se acoge la redhibitoria / se rechaza"]
    ambito: civil
    instituciones_relacionadas: ["evicción", "compraventa"]

  evicción:
    sinonimos: ["saneamiento de la evicción", "obligación de saneamiento"]
    normas: ["CC art 1837", "CC art 1838", "CC art 1839", "CC art 1840",
             "CC art 1843", "CC art 1847", "CC art 1850", "CC art 1856"]
    antonimos_resolucion: ["procede saneamiento / no procede saneamiento"]
    ambito: civil
    instituciones_relacionadas: ["vicios redhibitorios", "compraventa"]

  nulidad absoluta:
    sinonimos: ["nulidad de pleno derecho", "nulidad absoluta", "objeto ilícito",
                 "causa ilícita", "incapacidad absoluta"]
    normas: ["CC art 1681", "CC art 1682", "CC art 1683", "CC art 1466",
             "CC art 1467"]
    antonimos_resolucion: ["es nulo / es válido", "se declara la nulidad / se rechaza"]
    ambito: civil
    instituciones_relacionadas: ["nulidad relativa", "ineficacia"]

  nulidad relativa:
    sinonimos: ["rescisión", "nulidad relativa", "vicios del consentimiento",
                 "error", "fuerza", "dolo"]
    normas: ["CC art 1681", "CC art 1682", "CC art 1684", "CC art 1691",
             "CC art 1451", "CC art 1452", "CC art 1453", "CC art 1454",
             "CC art 1456", "CC art 1457", "CC art 1458"]
    antonimos_resolucion: ["procede la rescisión / no procede"]
    ambito: civil
    instituciones_relacionadas: ["nulidad absoluta", "lesión enorme"]

  resolución contractual:
    sinonimos: ["resolución del contrato", "condición resolutoria tácita",
                 "acción resolutoria"]
    normas: ["CC art 1489", "CC art 1873", "CC art 1875", "CC art 1877"]
    antonimos_resolucion: ["procede la resolución / no procede"]
    ambito: civil
    instituciones_relacionadas: ["responsabilidad contractual", "indemnización de perjuicios"]

  indemnización de perjuicios:
    sinonimos: ["daños y perjuicios", "indemnización", "lucro cesante",
                 "daño emergente", "daño moral"]
    normas: ["CC art 1556", "CC art 1557", "CC art 1558", "CC art 1559",
             "CC art 2314", "CC art 2329"]
    antonimos_resolucion: ["procede la indemnización / no procede",
                            "se condena al pago / se absuelve"]
    ambito: civil
    instituciones_relacionadas: ["responsabilidad contractual", "responsabilidad extracontractual"]

  enriquecimiento sin causa:
    sinonimos: ["enriquecimiento injusto", "in rem verso", "actio in rem verso"]
    normas: ["CC art 1467", "CC art 2295", "CC art 2300"]
    antonimos_resolucion: ["hay enriquecimiento sin causa / no hay"]
    ambito: civil

  prescripción extintiva:
    sinonimos: ["prescripción liberatoria", "extinción por el tiempo",
                 "prescripción adquisitiva"]
    normas: ["CC art 2492", "CC art 2493", "CC art 2497", "CC art 2503",
