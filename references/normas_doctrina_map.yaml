    normas: ["DFL 164/1991 MOP", "Ley 19.886", "DS 956 MOP", "DFL 850 MOP"]
    antonimos_resolucion: ["se acoge / se rechaza"]
    ambito: administrativo
    instituciones_relacionadas: ["contrato administrativo", "comisión arbitral concesiones"]

