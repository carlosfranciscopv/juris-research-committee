                 "modificación contrato administrativo"]
    normas: ["Ley 19.886 art 13", "DS 250/2004 art 77", "DFL 164 MOP"]
    antonimos_resolucion: ["procede ius variandi / no procede"]
    ambito: administrativo
    instituciones_relacionadas: ["contrato administrativo", "equilibrio económico"]

  equilibrio económico contrato:
    sinonimos: ["ecuación económica", "equilibrio financiero",
                 "restablecimiento del equilibrio"]
    normas: ["Ley 19.886", "DFL 164 MOP art 22", "Ley 19.880"]
    antonimos_resolucion: ["se afecta el equilibrio / no se afecta"]
    ambito: administrativo
    instituciones_relacionadas: ["ius variandi", "imprevisión"]

  # ============== ADMINISTRATIVO Y CONSTITUCIONAL ==============

  recurso de protección:
