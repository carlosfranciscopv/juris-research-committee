# Mapeo institución jurídica → sinónimos + normas + antónimos.
# Corazón del triage 100% determinístico. Cada entrada permite:
#   - Detectar la institución en la tesis del usuario (preflight + 01)
#   - Generar variantes Solr (01_expand_query)
#   - Detectar pronunciamiento expreso en sentencias (05_triage Test 1)
#   - Match de normas centrales (05_triage Test 2)
#   - Detectar adversidad (polaridad antónima)
#
# Ámbitos: civil, comercial, administrativo, laboral, procesal, tributario.
# Foco: instituciones comunes en práctica de proyectos/infraestructura (Dentons),
# civil general, comercial, contratación pública.
#
# Schema por institución:
#   sinonimos: [list de variantes textuales]
#   normas: [list "CUERPO art X" como aparecen en sentencias]
#   antonimos_resolucion: [pares verbales positivo/negativo para detectar polaridad]
#   ambito: civil|comercial|administrativo|laboral|procesal|tributario
#   instituciones_relacionadas: [otras claves del yaml]
#   tipo_recurso_tipico: [casacion-fondo, queja, proteccion, ...]

instituciones:

  # ============== CIVIL — OBLIGACIONES Y CONTRATOS ==============

  responsabilidad solidaria:
    sinonimos: ["in solidum", "obligación solidaria", "responder solidariamente",
                 "deudores solidarios", "solidaridad pasiva"]
    normas: ["CC art 1511", "CC art 1512", "CC art 1514", "CC art 1518",
             "CC art 1522", "Ley 19.886 art 6", "CT art 183-A", "CT art 183-B"]
    antonimos_resolucion: ["responde / no responde", "es solidario / no es solidario",
                            "se condena solidariamente / se rechaza solidaridad"]
    ambito: civil
    instituciones_relacionadas: ["responsabilidad subsidiaria", "obligación divisible"]
    tipo_recurso_tipico: ["casacion-fondo", "casacion-forma"]

  responsabilidad subsidiaria:
    sinonimos: ["responder subsidiariamente", "deudor subsidiario", "subsidiariedad"]
    normas: ["CC art 1535", "CT art 183-A", "CT art 183-B", "Ley 19.886 art 6"]
    antonimos_resolucion: ["responde subsidiariamente / no responde subsidiariamente"]
    ambito: civil
    instituciones_relacionadas: ["responsabilidad solidaria", "fianza"]

  responsabilidad contractual:
    sinonimos: ["incumplimiento contractual", "responsabilidad por incumplimiento",
                 "indemnización contractual", "daños contractuales"]
    normas: ["CC art 1545", "CC art 1546", "CC art 1547", "CC art 1556",
             "CC art 1557", "CC art 1558", "CC art 1567", "CC art 1568"]
    antonimos_resolucion: ["incumple / cumple", "responde / no responde",
                            "se acoge la indemnización / se rechaza"]
    ambito: civil
    instituciones_relacionadas: ["fuerza mayor", "caso fortuito", "indemnización de perjuicios"]

  responsabilidad extracontractual:
    sinonimos: ["responsabilidad aquiliana", "delito civil", "cuasidelito civil",
                 "daños extracontractuales"]
    normas: ["CC art 2314", "CC art 2316", "CC art 2317", "CC art 2320",
             "CC art 2329", "CC art 2330", "CC art 2331", "CC art 2332"]
    antonimos_resolucion: ["procede la indemnización / no procede",
                            "hay daño / no hay daño"]
    ambito: civil
    instituciones_relacionadas: ["daño moral", "lucro cesante", "daño emergente"]

  fuerza mayor:
    sinonimos: ["caso fortuito", "imprevisto irresistible", "evento fortuito"]
    normas: ["CC art 45", "CC art 1547", "CC art 1670", "CC art 1672"]
    antonimos_resolucion: ["constituye fuerza mayor / no constituye fuerza mayor",
                            "exime de responsabilidad / no exime"]
    ambito: civil
    instituciones_relacionadas: ["responsabilidad contractual", "imprevisión"]

  imprevisión:
